name: Docs

# Builds the Astro Starlight site (guides + samples + TypeDoc API reference) and deploys it
# to GitHub Pages. Enable Pages with "Source: GitHub Actions" in the repo settings first.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**' # the TypeDoc API reference is generated from the module source
      - 'example/**' # sample pages embed the example sources
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      # Module deps + build — TypeDoc resolves the API from ../src and needs react/react-native types.
      - name: Install + build module
        run: npm ci

      - name: Install docs deps
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build

      # A custom domain serves the repo at the domain ROOT, but the app uses base `/expo-arcgis`.
      # Publish the app under /expo-arcgis/ and redirect the bare root there, so
      # https://<domain>/ → https://<domain>/expo-arcgis/.
      - name: Stage site with root → /expo-arcgis redirect
        run: |
          rm -rf _site && mkdir -p _site/expo-arcgis
          cp -a docs/dist/. _site/expo-arcgis/
          printf '<!doctype html>\n<meta charset="utf-8">\n<title>expo-arcgis</title>\n<meta http-equiv="refresh" content="0; url=/expo-arcgis/">\n<link rel="canonical" href="/expo-arcgis/">\n<script>location.replace("/expo-arcgis/")</script>\n<a href="/expo-arcgis/">Go to expo-arcgis &rarr;</a>\n' > _site/index.html
          printf 'mapforge.dev\n' > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
